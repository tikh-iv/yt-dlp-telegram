services:
  api-service:
    image: eevarn/video-downloader-api:latest
    environment:
      - API_TOKEN=${API_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: on-failure

  download-service:
    image: eevarn/video-downloader-download:latest
    # network_mode: host — обязательно. Docker bridge-сеть делает SNAT,
    # и YouTube помечает такие соединения как bot ("Sign in to confirm you're
    # not a bot"), даже без cookies и с валидным PO Token. На host-сети
    # соединение идёт как от приложения с хоста и проходит.
    # См. git history: этот режим уже ставили (commit 4b2db93) и потом потеряли.
    network_mode: host
    environment:
      - REDIS_HOST=127.0.0.1
      - POTOKEN_URL=http://127.0.0.1:4416
    volumes:
      - downloads:/app/downloads
      - ./config:/app/config:ro
    depends_on:
      - redis
      - potoken-service
    restart: on-failure

  # bgutil PO Token provider — генерирует PO Token для yt-dlp,
  # чтобы обойти YouTube "Sign in to confirm you're not a bot".
  # Plugin внутри download-service сам стучится к этому сервису.
  # Тег pinned (1.3.1): major версия plugin в download-service и server должны совпадать.
  # Порт публикуем на хосте: download-service работает в network_mode: host
  # и не имеет доступа к Docker DNS, поэтому ходит к провайдеру через 127.0.0.1.
  potoken-service:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    container_name: bgutil-pot-provider
    init: true
    ports:
      - "127.0.0.1:4416:4416"
    restart: on-failure

  telegram-service:
    image: eevarn/video-downloader-telegram:latest
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
    volumes:
      - downloads:/app/downloads
    depends_on:
      - redis
    restart: on-failure

  cleanup-service:
    image: eevarn/video-downloader-cleanup:latest
    environment:
      - MAX_AGE_HOURS=1
      - CLEANUP_INTERVAL_SECONDS=600
    volumes:
      - downloads:/app/downloads
    restart: on-failure

  redis:
    image: redis:alpine
    # Порт публикуем только на loopback: download-service работает
    # в network_mode: host и подключается к Redis через 127.0.0.1:6379.
    # Наружу порт не торчит. Остальные сервисы (api/telegram/cleanup)
    # продолжают ходить к Redis по имени `redis` через Docker DNS.
    ports:
      - "127.0.0.1:6379:6379"
    restart: on-failure

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - DOCKER_API_VERSION=1.44
    restart: on-failure

volumes:
  downloads:
