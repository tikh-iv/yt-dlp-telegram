services:
  api-service:
    image: eevarn/video-downloader-api:latest
    environment:
      - API_TOKEN=${API_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: on-failure

  download-service:
    image: eevarn/video-downloader-download:latest
    environment:
      - REDIS_HOST=redis
      - POTOKEN_URL=http://potoken-service:4416
    volumes:
      - downloads:/app/downloads
      - ./config:/app/config:ro
    depends_on:
      - redis
      - potoken-service
    restart: on-failure

  # bgutil PO Token provider — генерирует PO Token для yt-dlp,
  # чтобы обойти YouTube "Sign in to confirm you're not a bot".
  # Plugin внутри download-service сам стучится к этому сервису.
  # Тег pinned (1.3.1): major версия plugin в download-service и server должны совпадать.
  potoken-service:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    container_name: bgutil-pot-provider
    init: true
    restart: on-failure

  telegram-service:
    image: eevarn/video-downloader-telegram:latest
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
    volumes:
      - downloads:/app/downloads
    depends_on:
      - redis
    restart: on-failure

  cleanup-service:
    image: eevarn/video-downloader-cleanup:latest
    environment:
      - MAX_AGE_HOURS=1
      - CLEANUP_INTERVAL_SECONDS=600
    volumes:
      - downloads:/app/downloads
    restart: on-failure

  redis:
    image: redis:alpine
    restart: on-failure

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - DOCKER_API_VERSION=1.44
    restart: on-failure

volumes:
  downloads:
