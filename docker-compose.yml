services:
  api-service:
    image: eevarn/video-downloader-api:latest
    ports:
      - "8000:8000"
    environment:
      - API_TOKEN=${API_TOKEN}
    secrets:
      - api_token
    networks:
      - downloader
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s

  download-service:
    image: eevarn/video-downloader-download:latest
    network_mode: host
    environment:
      - REDIS_HOST=127.0.0.1
    volumes:
      - download_data:/app/downloads
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s

  telegram-service:
    image: eevarn/video-downloader-telegram:latest
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - API_URL=http://api-service:8000
    depends_on:
      - api-service
    secrets:
      - telegram_token
    volumes:
      - download_data:/app/downloads
    networks:
      - downloader
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - downloader
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
    networks:
      - downloader
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure


secrets:
  api_token:
    external: true
  telegram_token:
    external: true

volumes:
  download_data:

networks:
  downloader:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: "1450"
