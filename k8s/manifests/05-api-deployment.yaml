apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: video-downloader
  labels:
    app: api-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      automountServiceAccountToken: false
      containers:
      - name: api
        image: eevarn/video-downloader-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "redis"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /docs        # FastAPI Swagger UI точно есть
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: secrets
          mountPath: /run/secrets
          readOnly: true
      volumes:
      - name: secrets
        secret:
          secretName: app-secrets      # ← ЭТО БЫЛО ПРОПУЩЕНО!
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: video-downloader
spec:
  selector:
    app: api-service
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP